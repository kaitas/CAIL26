name: Deploy NobelEngine to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時に1つのデプロイのみ。進行中のランはキャンセルせず完了を待つ
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # --- CI: AGENTS.md ガードレール検証（合格しない限りデプロイしない）---
  validate:
    name: Validate (CI)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate guardrails (single-file / functions / i18n)
        run: node scripts/validate.mjs

  # --- CD: 検証合格後に GitHub Pages へ静的配信 ---
  deploy:
    name: Deploy (CD)
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact (static single-file engine + portal)
        uses: actions/upload-pages-artifact@v3
        with:
          # ビルド工程なし。リポジトリ直下をそのまま配信（index.html がエントリ）
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
